<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Proportional Symbols Map – Covid-19 US</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.5.0/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.5.0/mapbox-gl.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { font-family: 'Open Sans', sans-serif; }

        #map {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #navbar {
            position: fixed;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 0.4rem;
            display: flex;
            gap: 0.4rem;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        #navbar a {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
            white-space: nowrap;
        }

        #navbar a:hover { background: #f0f0f0; color: #333; }
        #navbar a.active { background: #e05c3a; color: white; }

        .map-overlay {
            position: absolute;
            background: white;
            border-radius: 8px;
            padding: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        #features {
            top: 1rem;
            left: 1rem;
            min-width: 160px;
        }

        #features h2 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
        #features p { color: #666; }
        #features h3 { font-size: 0.9rem; margin-bottom: 0.2rem; }

        #legend {
            bottom: 2rem;
            right: 1rem;
        }

        #legend b { display: block; margin-bottom: 0.75rem; font-size: 0.85rem; }

        .legend-circle-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.5rem;
        }

        .legend-circle {
            border-radius: 50%;
            background: rgba(224, 92, 58, 0.5);
            border: 1px solid rgba(224, 92, 58, 0.9);
            flex-shrink: 0;
        }

        .legend-circle-row span { font-size: 0.82rem; color: #555; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="navbar">
        <a href="map1.html">Choropleth Map</a>
        <a href="map2.html" class="active">Proportional Symbols Map</a>
    </div>

    <div class="map-overlay" id="features">
        <h2>Covid-19 Rate</h2>
        <div id="text-description">
            <p>Hover over a circle!</p>
        </div>
    </div>

    <div class="map-overlay" id="legend">
        <b>Cases per 100k</b>
        <div class="legend-circle-row">
            <div class="legend-circle" style="width:36px;height:36px;"></div>
            <span>1000+</span>
        </div>
        <div class="legend-circle-row">
            <div class="legend-circle" style="width:24px;height:24px;"></div>
            <span>500</span>
        </div>
        <div class="legend-circle-row">
            <div class="legend-circle" style="width:14px;height:14px;"></div>
            <span>100</span>
        </div>
        <div class="legend-circle-row">
            <div class="legend-circle" style="width:6px;height:6px;"></div>
            <span>&lt;10</span>
        </div>
    </div>

    <script>
        mapboxgl.accessToken = 'pk.eyJ1IjoicGxlb25uIiwiYSI6ImNtbXR3c2F5bDIyOWEyc29tbDd3ZXc5aWEifQ.uH6hJ7qTyG_0rnhWgexuFg';

        const map = new mapboxgl.Map({
            container: 'map',
            style: 'mapbox://styles/mapbox/light-v10',
            zoom: 3,
            center: [-100, 40]
        });

        async function geojsonFetch() {
            let response = await fetch('assets/state_data.geojson');
            let state_data = await response.json();

            map.on('load', function () {
                map.addSource('state_data', {
                    type: 'geojson',
                    data: state_data
                });

                map.addLayer({
                    'id': 'state_borders',
                    'type': 'fill',
                    'source': 'state_data',
                    'paint': {
                        'fill-color': '#f0f0f0',
                        'fill-outline-color': '#cccccc',
                        'fill-opacity': 0.4
                    }
                });

                map.addLayer({
                    'id': 'state_circles',
                    'type': 'circle',
                    'source': 'state_data',
                    'paint': {
                        'circle-radius': [
                            'interpolate', ['linear'], ['get', 'density'],
                            0,    3,
                            10,   6,
                            50,   10,
                            100,  16,
                            200,  22,
                            500,  30,
                            1000, 40
                        ],
                        'circle-color': 'rgba(224, 92, 58, 0.5)',
                        'circle-stroke-color': 'rgba(224, 92, 58, 0.9)',
                        'circle-stroke-width': 1
                    }
                });
            });

            map.on('mousemove', ({ point }) => {
                const state = map.queryRenderedFeatures(point, { layers: ['state_circles'] });
                document.getElementById('text-description').innerHTML = state.length
                    ? `<h3>${state[0].properties.name}</h3><p><strong>${state[0].properties.density}</strong> cases per 100k</p>`
                    : `<p>Hover over a circle!</p>`;
            });

            map.on('mouseenter', 'state_circles', () => map.getCanvas().style.cursor = 'pointer');
            map.on('mouseleave', 'state_circles', () => map.getCanvas().style.cursor = '');
        }

        geojsonFetch();
    </script>

</body>
</html>
